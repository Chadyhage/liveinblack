<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- fond noir carré, comme la référence -->
  <rect x="0" y="0" width="64" height="64" fill="#000000"/>
  <!-- cercle violet qui épouse les bords : rayon large + trait épais, marge minime -->
  <circle cx="32" cy="32" r="28.5" fill="none" stroke="#c94ff0" stroke-width="5"/>
  <!-- L : barre verticale + pied, formes pleines (pas de police) -->
  <rect x="14" y="16" width="6.5" height="30" fill="#ffffff"/>
  <rect x="14" y="39.5" width="13" height="6.5" fill="#ffffff"/>
  <!-- séparateur vertical pleine hauteur -->
  <rect x="29.7" y="16" width="2.2" height="30" fill="#ffffff"/>
  <!-- B : colonne + deux bosses arrondies à droite, puis 2 contre-formes creusées -->
  <rect x="34" y="16" width="6.5" height="30" fill="#ffffff"/>
  <path d="M34,16 H43 A7,7 0 0 1 43,30 H34 Z" fill="#ffffff"/>
  <path d="M34,30 H43 A8,8 0 0 1 43,46 H34 Z" fill="#ffffff"/>
  <rect x="37.2" y="19.5" width="6.3" height="7.5" rx="3" fill="#000000"/>
  <rect x="37.2" y="33" width="7" height="9" rx="3.2" fill="#000000"/>
</svg>
